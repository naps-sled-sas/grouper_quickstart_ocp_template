apiVersion: apps/v1
kind: Deployment
metadata:
  name: grouper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grouper
  template:
    metadata:
      labels:
        app: grouper
    spec:
      initContainers:
      - name: wait-for-postgresql
        image: registry.access.redhat.com/ubi9/ubi-minimal:latest
        command:
          - bash
          - -c
          - |
            echo "Waiting for PostgreSQL to be ready..."
            until timeout 1 bash -c 'cat < /dev/null > /dev/tcp/postgresql/5432'; do
              echo "PostgreSQL is unavailable - sleeping"
              sleep 2
            done
            echo "PostgreSQL is up - executing command"
      containers:
      - name: grouper
        image: docker.io/i2incommon/grouper:7.1.0
        imagePullPolicy: Always
        resources:
          limits:
            memory: 4Gi
            cpu: 4
          requests:
            memory: 1Gi
            cpu: 1
        args:
          - ui
        env:
          - name: GROUPER_MORPHSTRING_ENCRYPT_KEY
            valueFrom:
              secretKeyRef:
                key: grouper-morphstring-encrypt-key
                name: grouper
          - name: GROUPER_DATABASE_URL
            value: jdbc:postgresql://postgresql:5432/grouper?currentSchema=public
          - name: GROUPER_DATABASE_USERNAME
            valueFrom:
              secretKeyRef:
                name: postgresql
                key: database-user
          - name: GROUPER_DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgresql
                key: database-password
          - name: GROUPERSYSTEM_QUICKSTART_PASS
            valueFrom:
              secretKeyRef:
                key: groupersystem-quickstart-pass
                name: grouper
          - name: GROUPER_OPENSHIFT
            value: 'true'
          - name: GROUPER_UI_ONLY
            value: 'true'
          - name: GROUPER_AUTO_DDL_UPTOVERSION
            value: '7.*.*'
          - name: GROUPER_UI_GROUPER_AUTH
            value: 'true'
        ports:
          - containerPort: 8443
            protocol: TCP
            name: https
